<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄油宠物洗护店 - 预约登记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .selected-item {
            background-color: #fef9c3 !important; /* 奶油黄背景 */
            border-color: #eab308 !important; /* 黄油色边框 */
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-yellow-50 min-h-screen p-4 flex flex-col items-center">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-6 mt-10">
        <h1 class="text-3xl font-bold text-yellow-700 text-center mb-2">🧈 黄油宠物洗护店</h1>
        <p class="text-gray-500 text-center mb-8">像黄油一样治愈的洗护体验</p>

        <div class="space-y-3 mb-8" id="service-options">
            <div onclick="selectService(this, '基础洗护')" class="cursor-pointer border-2 border-gray-100 rounded-2xl p-4 transition-all hover:bg-gray-50 flex justify-between items-center">
                <span class="font-bold text-gray-700">基础洗护</span>
                <span class="text-yellow-600 font-bold">¥58 起</span>
            </div>
            <div onclick="selectService(this, '深度SPA')" class="cursor-pointer border-2 border-gray-100 rounded-2xl p-4 transition-all hover:bg-gray-50 flex justify-between items-center">
                <span class="font-bold text-gray-700">深度SPA</span>
                <span class="text-yellow-600 font-bold">¥128 起</span>
            </div>
            <div onclick="selectService(this, '全套造型')" class="cursor-pointer border-2 border-gray-100 rounded-2xl p-4 transition-all hover:bg-gray-50 flex justify-between items-center">
                <span class="font-bold text-gray-700">全套造型</span>
                <span class="text-yellow-600 font-bold">¥188 起</span>
            </div>
        </div>

        <form action="https://formspree.io/f/https://formspree.io/f/xlgpbrwq" method="POST" class="space-y-4">
            <input type="hidden" name="selected_service" id="selected-service-input">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">宠物昵称</label>
                <input type="text" name="pet_name" required placeholder="如：小团子" class="w-full border-gray-200 border-2 rounded-xl p-3 focus:outline-none focus:border-yellow-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">联系电话</label>
                <input type="tel" name="phone" required placeholder="请输入手机号" class="w-full border-gray-200 border-2 rounded-xl p-3 focus:outline-none focus:border-yellow-400">
            </div>
            <button type="submit" class="w-full bg-yellow-400 text-yellow-900 font-bold py-4 rounded-2xl shadow-md hover:bg-yellow-500 transition-colors mt-4">
                立即提交预约
            </button>
        </form>
    </div>

    <script>
        function selectService(element, serviceName) {
            const options = document.querySelectorAll('#service-options > div');
            options.forEach(opt => opt.classList.remove('selected-item'));
            element.classList.add('selected-item');
            document.getElementById('selected-service-input').value = serviceName;
        }
    </script>
</body>
</html>
